// ─────────────────────────────────────────────
// LUSTIG SCORE
// ─────────────────────────────────────────────
function calcLustig(meals,sugar){
  if(!meals||!meals.length)return{score:0,label:"No data",color:"#94a3b8"};
  let pts=0,max=0;
  meals.forEach(m=>{pts+=(m.lustig||0);max+=2;});
  if(sugar>75)pts-=3;else if(sugar>50)pts-=2;else if(sugar<=25)pts+=2;else if(sugar<=35)pts+=1;
  const sc=Math.max(0,Math.min(10,max>0?Math.round(((pts+max)/(max*2))*10):5));
  return{score:sc,label:sc>=8?"Excellent":sc>=6?"Good":sc>=4?"Fair":"Poor",color:sc>=8?"#10b981":sc>=6?"#f59e0b":sc>=4?"#f97316":"#ef4444"};
}

function NumBox({value,onChange,min=0,max=999,w=56}){
  return h("input",{type:"number",value,min,max,onChange:e=>onChange(e.target.value),style:{width:w,padding:"7px 6px",borderRadius:8,border:"1.5px solid #e2e8f0",fontSize:14,fontWeight:700,textAlign:"center",outline:"none",background:"#f8fafc"}});
}
function Ring({val,max,color,label,sub,sz=76}){
  const r=(sz-8)/2,c=2*Math.PI*r,off=c-(Math.min(100,Math.round(val/max*100))/100)*c;
  return h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:3}},
    h("svg",{width:sz,height:sz},
      h("circle",{cx:sz/2,cy:sz/2,r,fill:"none",stroke:"#f1f5f9",strokeWidth:8}),
      h("circle",{cx:sz/2,cy:sz/2,r,fill:"none",stroke:color,strokeWidth:8,strokeLinecap:"round",strokeDasharray:c,strokeDashoffset:off,transform:`rotate(-90 ${sz/2} ${sz/2})`}),
      h("text",{x:sz/2,y:sz/2-3,textAnchor:"middle",fontSize:13,fontWeight:700,fill:"#1e293b"},Math.round(val)),
      h("text",{x:sz/2,y:sz/2+11,textAnchor:"middle",fontSize:8,fill:"#94a3b8"},sub)
    ),
    h("span",{style:{fontSize:10,color:"#64748b",fontWeight:600}},label)
  );
}
function Bar({label,val,max,color,unit}){
  return h("div",{style:{marginBottom:10}},

}

function FoodRow({meal,onDelete,onEdit}){
  const [editing,setEditing]=useState(false);
  const [vals,setVals]=useState({name:meal.name,cal:meal.cal,protein:meal.protein,sugar:meal.sugar,fat:meal.fat});
  const save=()=>{onEdit({...meal,...vals,cal:+vals.cal,protein:+vals.protein,sugar:+vals.sugar,fat:+vals.fat});setEditing(false);};
  if(editing) return h("div",{style:{padding:"10px 0",borderBottom:"1px solid #f8fafc"}},
    h("input",{style:{...inp,marginBottom:6},value:vals.name,onChange:e=>setVals(p=>({...p,name:e.target.value}))}),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:8}},
      ...["cal","protein","sugar","fat"].map(f=>h("input",{key:f,type:"number",style:inp,placeholder:f.charAt(0).toUpperCase()+f.slice(1),value:vals[f],onChange:e=>setVals(p=>({...p,[f]:e.target.value}))}))
    ),
    h("div",{style:{display:"flex",gap:6}},
      h("button",{onClick:save,style:{...btn("#10b981","white"),flex:1,padding:"7px"}},"Save"),
      h("button",{onClick:()=>setEditing(false),style:{...btn("#f1f5f9","#475569"),flex:1,padding:"7px"}},"Cancel")
    )
  );
  return h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #f8fafc"}},
    h("div",{style:{flex:1,minWidth:0}},
      h("div",{style:{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},meal.name),
      h("div",{style:{fontSize:10,color:"#94a3b8"}},meal.cal," kcal · ",meal.protein,"g P · ",meal.sugar,"g S")
    ),
    h("div",{style:{display:"flex",gap:4,flexShrink:0}},
      h("button",{onClick:()=>setEditing(true),style:{background:"none",border:"none",color:"#94a3b8",fontSize:14,cursor:"pointer",padding:"2px 6px"}},"✏️"),
      h("button",{onClick:onDelete,style:{background:"none",border:"none",color:"#fca5a5",fontSize:14,cursor:"pointer",padding:"2px 4px"}},"✕")
    )
  );
}

      h("div",{onClick:()=>onUpdate("done",!ex.done),style:{width:22,height:22,borderRadius:5,border:ex.done?"none":"1.5px solid #e2e8f0",background:ex.done?"#10b981":"white",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}},
        ex.done&&h("span",{style:{color:"white",fontSize:13}},"✓")
      )
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,alignItems:"end",marginBottom:8}},
      ...[{l:"Sets",f:"sets"},{l:"Reps",f:"reps"}].map(c=>
        h("div",{key:c.f},
          h("div",{style:{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:4}},c.l),

        isBodyweight
          ?h("div",{style:{fontSize:11,color:"#94a3b8",paddingTop:8}},ex.unit)

            h(NumBox,{value:ex.weight,min:0,max:300,onChange:v=>onUpdate("weight",v)}),

    ex.custom&&h("button",{onClick:onRemove,style:{...btn("#fef2f2","#ef4444"),padding:"4px 10px",fontSize:11,marginTop:6}},"Remove")

function FinishModal({day,exs,date,rebootStreak,onClose,onSave}){
  const tot=day.meals.reduce((a,m)=>({cal:a.cal+(m.cal||0),protein:a.protein+(m.protein||0),sugar:a.sugar+(m.sugar||0),fat:a.fat+(m.fat||0)}),{cal:0,protein:0,sugar:0,fat:0});
  const o3=(day.meals.reduce((a,m)=>a+(m.omega3||0),0)+day.omega3).toFixed(2);
  const lustig=calcLustig(day.meals,tot.sugar);
  const [copied,setCopied]=useState(false);

  const mealLines=day.meals.map(m=>`  - ${m.name}: ${m.cal}kcal, ${m.protein}g P, ${m.sugar}g S`).join("\n")||"  None logged";
  const exLines=exs.map(e=>`  - ${e.name}: ${e.sets}x${e.reps}${!e.unit.includes("BW")&&!e.unit.includes("−")?" @ "+e.weight+e.unit:""} ${e.done?"✓":""}${e.note?" ["+e.note+"]":""}`).join("\n")||"  Rest day";

  const summary=`DAY FINISHED — ${date}
Weight: ${day.weight||"—"}kg | Sleep: ${day.sleepScore||"—"} | Bedtime: ${day.bedtime||"—"}
Calories: ${Math.round(tot.cal)}kcal | Protein: ${Math.round(tot.protein)}g | Sugar: ${Math.round(tot.sugar)}g
Omega-3: ${o3}g | Coffees: ${day.coffees} | L-Theanine: ${day.ltheanine}mg | Creatine: ${day.creatine}mg
Lustig Score: ${lustig.score}/10 (${lustig.label}) | Reboot streak: ${rebootStreak} days
Meals:
${mealLines}
Training (${exs.filter(e=>e.done).length}/${exs.length} done):
${exLines}`;

  const doCopy=()=>{
    const done=()=>{setCopied(true);saveDay(date,{...day,exs,finalized:true});onSave({tot,o3,lustig});setTimeout(()=>setCopied(false),5000);};
    navigator.clipboard.writeText(summary).then(done).catch(()=>{
      const ta=document.getElementById("fin-ta");
      if(ta){ta.select();document.execCommand("copy");}
      done();
    });
  };

  return h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:200,display:"flex",alignItems:"flex-end"},onClick:onClose},
    h("div",{onClick:e=>e.stopPropagation(),style:{background:"#fff",borderRadius:"20px 20px 0 0",padding:20,width:"100%",maxWidth:480,margin:"0 auto",maxHeight:"88vh",overflowY:"auto"}},
      h("div",{style:{width:40,height:4,background:"#e2e8f0",borderRadius:2,margin:"0 auto 16px"}}),
      h("h2",{style:{fontSize:18,fontWeight:800,marginBottom:4}},"Finish Day"),
      h("p",{style:{fontSize:12,color:"#64748b",marginBottom:12}},"Copy this summary and paste it into Claude chat — Claude will sync to Notion."),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}},
        h("div",{style:{background:"#f0fdf4",borderRadius:10,padding:10,textAlign:"center"}},
          h("div",{style:{fontSize:10,color:"#16a34a"}},"Lustig Score"),
          h("div",{style:{fontSize:22,fontWeight:800,color:lustig.color}},lustig.score,h("span",{style:{fontSize:12}},"/10")),
          h("div",{style:{fontSize:10,color:"#64748b"}},lustig.label)
        ),
        h("div",{style:{background:"#eff6ff",borderRadius:10,padding:10,textAlign:"center"}},
          h("div",{style:{fontSize:10,color:"#2563eb"}},"Reboot Streak"),
          h("div",{style:{fontSize:22,fontWeight:800,color:"#2563eb"}},rebootStreak,h("span",{style:{fontSize:12}},"d")),
          h("div",{style:{fontSize:10,color:"#64748b"}},"Keep going!")
        )
      ),

// MAIN APP
// ─────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState("dash");
  const [viewDate,setViewDate]=useState(todayStr());
  const isToday=viewDate===todayStr();

  const [day,setDay]=useState(()=>loadDay(todayStr())||emptyDay());
  const [exs,setExs]=useState(()=>{const d=loadDay(todayStr());return d&&d.exs&&d.exs.length?d.exs:EU.map(e=>({...e,done:false}));});

  const [rebootStreak,setRebootStreak]=useState(()=>loadG("rebootStreak",0));
  const [rebootStart,setRebootStart]=useState(()=>loadG("rebootStart",""));

  const [fsearch,setFsearch]=useState("");
  const [qtys,setQtys]=useState({});
  const [manual,setManual]=useState({name:"",cal:"",protein:"",sugar:"",fat:""});
  const [showM,setShowM]=useState(false);
  const [showCEx,setShowCEx]=useState(false);
  const [cex,setCex]=useState({name:"",tag:"push",sets:3,reps:10,weight:0,unit:"kg",note:""});
  const [photoItems,setPhotoItems]=useState(null);
  const [photoLoading,setPhotoLoading]=useState(false);
  const [showFinish,setShowFinish]=useState(false);
  const [saveFlash,setSaveFlash]=useState(false);
  const fileRef=useRef();

  // Load day on date switch
  useEffect(()=>{
    const d=loadDay(viewDate)||emptyDay();
    setDay(d);
    setExs(d.exs&&d.exs.length?d.exs:EU.map(e=>({...e,done:false})));
  },[viewDate]);

  // Auto-save
  useEffect(()=>{saveDay(viewDate,{...day,exs});},[day,exs]);

  useEffect(()=>{saveG("rebootStreak",rebootStreak);},[rebootStreak]);
  useEffect(()=>{saveG("rebootStart",rebootStart);},[rebootStart]);

  const upd=(k,v)=>setDay(p=>({...p,[k]:v}));
  const updEx=(i,k,v)=>setExs(p=>p.map((e,j)=>j===i?{...e,[k]:v}:e));
  const removeEx=(i)=>setExs(p=>p.filter((_,j)=>j!==i));

  const switchT=(t)=>{
    if(t==="custom"){setExs([]);upd("trainingType","custom");}
    else{setExs((t==="upper"?EU:EL).map(e=>({...e,done:false})));upd("trainingType",t);}
  };

  // Food helpers
  const getQ=(f)=>qtys[f.name]!==undefined?qtys[f.name]:f.def;
  const sc2=(f,field)=>Math.round(((f[field]||0)*(getQ(f)/f.per))*10)/10;

  const tot=day.meals.reduce((a,m)=>({cal:a.cal+(m.cal||0),protein:a.protein+(m.protein||0),sugar:a.sugar+(m.sugar||0),fat:a.fat+(m.fat||0),omega3:a.omega3+(m.omega3||0)}),{cal:0,protein:0,sugar:0,fat:0,omega3:0});
  const o3=tot.omega3+day.omega3;
  const lt=day.ltheanine;
  const cr=day.creatine;
  const T={cal:2800,protein:170,sugar:35,omega3:1.5,lt:400,creatine:5000};
  const sc=tot.sugar<=25?"#10b981":tot.sugar<=35?"#f59e0b":"#ef4444";
  const done=exs.filter(e=>e.done).length;
  const lustig=calcLustig(day.meals,tot.sugar);
  const today=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});

  const addFood=(f)=>{
    const q=getQ(f),mult=q/f.per;
    setDay(p=>({...p,meals:[...p.meals,{name:`${f.name} (${q}${f.per===1?"×":"g"})`,cal:Math.round((f.cal||0)*mult),protein:Math.round((f.protein||0)*mult*10)/10,sugar:Math.round((f.sugar||0)*mult*10)/10,fat:Math.round((f.fat||0)*mult*10)/10,omega3:Math.round((f.omega3||0)*mult*10)/10,lustig:f.lustig||0,id:Date.now()+Math.random()}]}));
    setFsearch("");
  };
  const editFood=(id,updated)=>setDay(p=>({...p,meals:p.meals.map(m=>m.id===id?{...m,...updated}:m)}));
  const delFood=(id)=>setDay(p=>({...p,meals:p.meals.filter(m=>m.id!==id)}));

  const addManual=()=>{
    if(!manual.name)return;
    const macros={cal:+manual.cal||0,protein:+manual.protein||0,sugar:+manual.sugar||0,fat:+manual.fat||0,lustig:0};
    setDay(p=>({...p,meals:[...p.meals,{name:manual.name,...macros,id:Date.now()}]}));
    setManual({name:"",cal:"",protein:"",sugar:"",fat:""});setShowM(false);
  };

  const addCEx=()=>{
    if(!cex.name)return;
    setExs(p=>[...p,{...cex,sets:+cex.sets,reps:+cex.reps,weight:+cex.weight,done:false,custom:true}]);
    setCex({name:"",tag:"push",sets:3,reps:10,weight:0,unit:"kg",note:""});setShowCEx(false);
  };

  const handlePhoto=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setPhotoLoading(true);setPhotoItems(null);

      const items=await analyzePhoto(ev.target.result.split(",")[1],file.type);

  const confirmPhotoItem=(item,idx)=>{
    setDay(p=>({...p,meals:[...p.meals,{...item,id:Date.now()}]}));

  };

  const handleSaveProgress=()=>{saveDay(viewDate,{...day,exs});setSaveFlash(true);setTimeout(()=>setSaveFlash(false),2000);};

  const ff=FOODS.filter(f=>f.name.toLowerCase().includes(fsearch.toLowerCase())).sort((a,b)=>a.rank-b.rank);

      h("div",{style:card},
        h("div",{style:stt},"Summary"),
        ...[{label:"Calories",val:tot.cal,max:T.cal,color:"#3b82f6",unit:" kcal"},{label:"Protein",val:tot.protein,max:T.protein,color:"#10b981",unit:"g"},{label:"Sugar",val:tot.sugar,max:T.sugar,color:sc,unit:"g"},{label:"Fat",val:tot.fat,max:100,color:"#f59e0b",unit:"g"}].map(b=>h(Bar,{key:b.label,...b})),
        h("div",{style:{padding:"9px 11px",borderRadius:9,background:"#f8fafc",display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}},
          h("div",null,h("div",{style:{fontSize:10,color:"#94a3b8"}},"Remaining cal"),h("div",{style:{fontSize:15,fontWeight:700}},Math.max(0,T.cal-tot.cal)," kcal")),
          h("div",null,h("div",{style:{fontSize:10,color:"#94a3b8"}},"Remaining protein"),h("div",{style:{fontSize:15,fontWeight:700}},Math.max(0,T.protein-tot.protein),"g"))
        )
      )
    ),

    // ══ TRAINING ══════════════════════════════════
    tab==="train"&&h("div",null,
      h("div",{style:card},
        h("div",{style:stt},"Session Type"),
        h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}},
          ...["upper","lower","custom"].map(t=>h("button",{key:t,onClick:()=>switchT(t),style:{...btn(day.trainingType===t?"#0f172a":"#f1f5f9",day.trainingType===t?"white":"#475569"),flex:1,padding:"10px 8px",minWidth:80}},t==="upper"?"Upper Body":t==="lower"?"Lower Body":"Custom"))
        ),
        h("div",{style:{display:"flex",alignItems:"center",gap:8,paddingTop:8}},
          h("div",{style:{flex:1,height:5,borderRadius:3,background:"#f1f5f9",overflow:"hidden"}},h("div",{style:{height:"100%",width:(done/Math.max(1,exs.length)*100)+"%",background:"#10b981",borderRadius:3}})),
          h("span",{style:{fontSize:11,fontWeight:700}},done,"/",exs.length," done")
        )
      ),

      // Science note for upper/lower
      (day.trainingType==="upper"||day.trainingType==="lower")&&h("div",{style:{...card,background:"#eff6ff",border:"none"}},
        h("div",{style:{fontSize:11,color:"#2563eb",fontWeight:600,marginBottom:2}},"📚 Program basis"),
        h("div",{style:{fontSize:10,color:"#3b82f6",lineHeight:1.5}},"Sets/reps optimised per Schoenfeld (2017) meta-analysis: 3–5 sets × 6–15 reps for hypertrophy. Face pulls at 20 reps for rotator cuff health. Comments from previous sessions are reflected in exercise targets.")
      ),

      ...exs.map((ex,i)=>h(ExRow,{key:i,ex,idx:i,onUpdate:(k,v)=>updEx(i,k,v),onRemove:()=>removeEx(i)})),

      // Add exercise
      h("div",{style:{...card,border:"1.5px dashed #e2e8f0",background:"#fafafa"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showCEx?12:0}},
          h("div",{style:{fontSize:12,fontWeight:600,color:"#64748b"}},"Add exercise"),
          h("button",{onClick:()=>setShowCEx(!showCEx),style:{...btn("#0f172a","white"),padding:"7px 14px"}},showCEx?"Cancel":"+")
        ),
        showCEx&&h("div",null,
          h("input",{style:{...inp,marginBottom:8},placeholder:"Exercise name",value:cex.name,onChange:e=>setCex(p=>({...p,name:e.target.value}))}),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
            h("div",null,h("div",{style:{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:3}},"Tag"),h("select",{value:cex.tag,onChange:e=>setCex(p=>({...p,tag:e.target.value})),style:{...inp,padding:"8px 10px"}},
              ...Object.keys(TC).map(t=>h("option",{key:t,value:t},t))
            )),
            h("div",null,h("div",{style:{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:3}},"Unit"),h("input",{style:inp,placeholder:"kg / BW",value:cex.unit,onChange:e=>setCex(p=>({...p,unit:e.target.value}))}))
          ),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:8}},
            ...[{l:"Sets",f:"sets"},{l:"Reps",f:"reps"},{l:"Weight",f:"weight"}].map(c=>h("div",{key:c.f},h("div",{style:{fontSize:10,color:"#94a3b8",fontWeight:600,marginBottom:3}},c.l),h("input",{type:"number",value:cex[c.f],onChange:e=>setCex(p=>({...p,[c.f]:e.target.value})),style:{...inp,padding:"8px 10px"}})))
          ),
          h("textarea",{rows:2,placeholder:"Note / goal for this exercise (optional)",value:cex.note,onChange:e=>setCex(p=>({...p,note:e.target.value})),style:{...inp,fontSize:12,marginBottom:8}}),
          h("button",{onClick:addCEx,style:{...btn("#10b981","white"),width:"100%",padding:11}},"Add to session")
        )
      )
    ),

    // ══ REBOOT ════════════════════════════════════
    tab==="reboot"&&h("div",null,
      h("div",{style:{...card,background:"#0f172a",color:"white"}},
        h("div",{style:{textAlign:"center",padding:"8px 0 14px"}},
          h("div",{style:{fontSize:11,fontWeight:700,color:"#94a3b8",letterSpacing:0.8,textTransform:"uppercase",marginBottom:8}},"Reboot Streak"),
          h("div",{style:{fontSize:72,fontWeight:800,color:"#38bdf8",lineHeight:1}},rebootStreak),
          h("div",{style:{fontSize:13,color:"#64748b",marginTop:4}},rebootStreak===1?"day":"days"),
          rebootStart&&h("div",{style:{fontSize:10,color:"#64748b",marginTop:4}},"Started: ",rebootStart)
        ),
        h("div",{style:{display:"flex",gap:8,marginBottom:12}},
          h("button",{onClick:()=>setRebootStreak(p=>p+1),style:{...btn("#38bdf8","#0f172a"),flex:1,padding:10}},"+ Day"),
          h("button",{onClick:()=>setRebootStreak(p=>Math.max(0,p-1)),style:{...btn("rgba(255,255,255,0.08)","#94a3b8"),flex:1,padding:10}},"− Day"),
          h("button",{onClick:()=>{setRebootStreak(0);setRebootStart(todayStr());},style:{...btn("#ef4444","white"),padding:"10px 16px"}},"Reset")
        ),
        h("div",null,
          h("div",{style:{fontSize:10,color:"#94a3b8",marginBottom:4}},"Set manually:"),
          h("div",{style:{display:"flex",gap:6}},
            h("input",{type:"number",min:0,max:365,placeholder:"0",id:"strk",style:{...inp,background:"rgba(255,255,255,0.08)",color:"white",border:"1px solid rgba(255,255,255,0.1)",flex:1}}),
            h("button",{onClick:()=>{const v=+document.getElementById("strk").value;if(!isNaN(v)&&v>=0){setRebootStreak(v);const d=new Date();d.setDate(d.getDate()-v);setRebootStart(fmtKey(d));}},style:{...btn("#38bdf8","#0f172a"),padding:"9px 14px"}},"Set")
          )
        )
      ),
      h("div",{style:card},
        h("div",{style:stt},"Progress to Day 90"),
        h("div",{style:{height:8,borderRadius:4,background:"#f1f5f9",overflow:"hidden",marginBottom:6}},
          h("div",{style:{height:"100%",width:Math.min(100,Math.round(rebootStreak/90*100))+"%",background:"linear-gradient(90deg,#3b82f6,#8b5cf6)",borderRadius:4,transition:"width 0.5s"}})
        ),
        h("div",{style:{fontSize:11,color:"#64748b",textAlign:"right"}},Math.round(rebootStreak/90*100),"% — Day ",rebootStreak," of 90")
      ),
      h("div",{style:card},
        h("div",{style:stt},"Milestones"),
        ...MILESTONES.map((m,i)=>{
          const reached=rebootStreak>=m.days;
          return h("div",{key:m.key,style:{display:"flex",gap:12,padding:"10px 0",borderBottom:"1px solid #f8fafc",opacity:reached?1:0.45}},
            h("div",{style:{width:26,height:26,borderRadius:6,background:reached?"#10b981":"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}},
              reached?h("span",{style:{color:"white",fontSize:13}},"✓"):h("span",{style:{color:"#94a3b8",fontSize:9,fontWeight:700}},m.days)
            ),
            h("div",{style:{flex:1}},
              h("div",{style:{fontSize:11,fontWeight:700,color:reached?"#0f172a":"#94a3b8",textTransform:"uppercase",letterSpacing:0.4}},m.label),
              h("div",{style:{fontSize:12,color:reached?"#475569":"#94a3b8",marginTop:1}},m.desc)
            )
          );
        })
      )
    ),

    // ══ LOG ═══════════════════════════════════════
    tab==="log"&&h("div",null,
      h("div",{style:card},
        h("div",{style:stt},"Past 14 Days"),
        ...Array.from({length:14},(_,i)=>{
          const d=new Date();d.setDate(d.getDate()-i);
          const dk=fmtKey(d);
          const data=loadDay(dk);
          const label=i===0?"Today":i===1?"Yesterday":d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
          const mt=data?.meals?.reduce((a,m)=>({cal:a.cal+(m.cal||0),protein:a.protein+(m.protein||0),sugar:a.sugar+(m.sugar||0)}),{cal:0,protein:0,sugar:0});
          const lg=data?calcLustig(data.meals||[],mt?.sugar||0):null;
          return h("div",{key:dk,onClick:()=>{setViewDate(dk);setTab("dash");},style:{padding:"9px 0",borderBottom:"1px solid #f8fafc",cursor:"pointer"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              h("div",null,
                h("div",{style:{fontSize:12,fontWeight:700,color:viewDate===dk?"#3b82f6":"#1e293b"}},label,data?.finalized&&h("span",{style:{fontSize:9,color:"#10b981",marginLeft:6}},"✓")),
                data?h("div",{style:{fontSize:10,color:"#94a3b8"}},Math.round(mt.cal),"kcal · ",Math.round(mt.protein),"g P · ",Math.round(mt.sugar),"g S",data.weight?" · "+data.weight+"kg":"",data.sleepScore?" · Sleep "+data.sleepScore:"")
                :h("div",{style:{fontSize:10,color:"#cbd5e1"}},"No data")
              ),
              data&&h("div",{style:{display:"flex",gap:6,alignItems:"center"}},
                lg&&h("span",{style:{fontSize:11,fontWeight:700,color:lg.color}},lg.score),
                h("span",{style:pill(mt.sugar<=50?"#f0fdf4":"#fef2f2",mt.sugar<=50?"#16a34a":"#ef4444")},mt.sugar<=50?"✓":"⚠")
              )
            )
          );
        })
      )
    )
  ),

  // Nav
  h("nav",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"white",borderTop:"1px solid #f1f5f9",display:"flex",padding:"7px 0 10px"}},
    ...TABS.map(t=>h("div",{key:t.id,onClick:()=>setTab(t.id),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",color:tab===t.id?"#0f172a":"#94a3b8"}},
      h("span",{style:{fontSize:t.id==="reboot"?16:17}},t.icon),
      h("span",{style:{fontSize:9,fontWeight:600}},t.label)
    ))
  ),

  showFinish&&h(FinishModal,{day,exs,date:viewDate,rebootStreak,onClose:()=>setShowFinish(false),onSave:()=>{}})
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(React.createElement(App));
</script>
</body>
</html>
